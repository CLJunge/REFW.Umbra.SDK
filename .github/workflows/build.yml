name: Build

on:
  push:
    branches: ['**']
    tags: ['v*.*.*']
  create:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build:
    name: Build Umbra.SDK
    runs-on: ubuntu-latest
    if: github.event_name != 'create' || (github.ref_type == 'tag' && startsWith(github.ref_name, 'v'))
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Resolve version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "value=0.0.0-dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Download REFramework csharp-api.zip
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p /tmp/refw-api

          LATEST=$(gh release list \
            --repo praydog/REFramework-nightly \
            --limit 1 \
            --json tagName \
            -q '.[0].tagName')

          echo "Latest nightly release: $LATEST"

          gh release download "$LATEST" \
            --repo praydog/REFramework-nightly \
            --pattern 'csharp-api.zip' \
            --dir /tmp/refw-api

      - name: Extract and stage API dependencies
        run: |
          EXTRACT=/tmp/refw-extracted
          mkdir -p "$EXTRACT"
          unzip -q /tmp/refw-api/csharp-api.zip -d "$EXTRACT"

          mkdir -p dependencies/reframework/api

          cp "$EXTRACT/reframework/plugins/REFramework.NET.dll" \
             dependencies/reframework/api/

          # Copy only the two managed dependencies directly referenced by the SDK and
          # plugin projects. AssemblyGenerator, REFCoreDeps, and Microsoft.CodeAnalysis.*
          # are REFramework host internals; they are not referenced by any project code.
          cp "$EXTRACT/reframework/plugins/managed/dependencies/Hexa.NET.ImGui.dll" \
             dependencies/reframework/api/
          cp "$EXTRACT/reframework/plugins/managed/dependencies/HexaGen.Runtime.dll" \
             dependencies/reframework/api/

          echo "Staged API DLLs:"
          ls -1 dependencies/reframework/api/

      - name: Generate AssemblyInfo.cs
        run: |
          VERSION="${{ steps.version.outputs.value }}"
          ASSEMBLY_VERSION="${VERSION%%-*}.0"
          mkdir -p Umbra.SDK/Properties
          cat > Umbra.SDK/Properties/AssemblyInfo.cs << EOF
          // <auto-generated/>
          using System.Reflection;

          [assembly: AssemblyTitle("Umbra.SDK")]
          [assembly: AssemblyDescription("A support library for REFramework mod and plugin development.")]
          [assembly: AssemblyCompany("CLJunge")]
          [assembly: AssemblyProduct("Umbra.SDK")]
          [assembly: AssemblyCopyright("Copyright © $(date +%Y) Chris-Lennart Junge — MIT License")]
          [assembly: AssemblyVersion("${ASSEMBLY_VERSION}")]
          [assembly: AssemblyFileVersion("${ASSEMBLY_VERSION}")]
          [assembly: AssemblyInformationalVersion("${VERSION}")]
          EOF

      - name: Build
        run: >
          dotnet build Umbra.SDK/Umbra.SDK.csproj
          --configuration Release
          --verbosity minimal
          -p:Version=${{ steps.version.outputs.value }}

      - name: Stage ZIP contents
        run: |
          mkdir -p staging/reframework/plugins/managed/dependencies
          cp Umbra.SDK/bin/Release/net10.0/Umbra.SDK.dll \
             staging/reframework/plugins/managed/dependencies/

      - name: Create Umbra.SDK.zip
        run: cd staging && zip -r ../Umbra.SDK.zip reframework/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Umbra.SDK
          path: staging/
          retention-days: 30
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: Umbra.SDK.zip
          generate_release_notes: true
          body: |
            ## Umbra.SDK `v${{ steps.version.outputs.value }}`

            > A support library for [REFramework](https://github.com/praydog/REFramework) mod and plugin development targeting RE Engine titles.

            ---

            ### 🛠️ For Developers

            Reference `Umbra.SDK.dll` in your plugin project to start building with the full SDK API.

            1. Download **`Umbra.SDK.zip`** from the assets below
            2. Extract `Umbra.SDK.dll` and add it as a reference in your plugin project
            3. See the [README](../../blob/main/README.md) for configuration, UI, and lifecycle guidance

            ---

            ### 🎮 For Players

            Extract **`Umbra.SDK.zip`** directly into your game's root folder to run plugins built with this SDK.

            > 💡 The zip preserves the full directory structure — just extract it at your game root and you're done.

            ---
