name: Build

on:
  push:
    branches: ['**']
    tags: ['v*.*.*']
  create:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build:
    name: Build Umbra
    runs-on: ubuntu-latest
    if: github.event_name != 'create' || (github.ref_type == 'tag' && startsWith(github.ref_name, 'v'))
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Resolve version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "value=0.0.0-dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Download REFramework csharp-api.zip
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p /tmp/refw-api

          LATEST=$(gh release list \
            --repo praydog/REFramework-nightly \
            --limit 1 \
            --json tagName \
            -q '.[0].tagName')

          echo "Latest nightly release: $LATEST"

          gh release download "$LATEST" \
            --repo praydog/REFramework-nightly \
            --pattern 'csharp-api.zip' \
            --dir /tmp/refw-api

      - name: Extract and stage API dependencies
        run: |
          EXTRACT=/tmp/refw-extracted
          mkdir -p "$EXTRACT"
          unzip -q /tmp/refw-api/csharp-api.zip -d "$EXTRACT"

          mkdir -p dependencies/reframework/api

          cp "$EXTRACT/reframework/plugins/REFramework.NET.dll" \
             dependencies/reframework/api/

          # Copy only the two managed dependencies directly referenced by the SDK and
          # plugin projects. AssemblyGenerator, REFCoreDeps, and Microsoft.CodeAnalysis.*
          # are REFramework host internals; they are not referenced by any project code.
          cp "$EXTRACT/reframework/plugins/managed/dependencies/Hexa.NET.ImGui.dll" \
             dependencies/reframework/api/
          cp "$EXTRACT/reframework/plugins/managed/dependencies/HexaGen.Runtime.dll" \
             dependencies/reframework/api/

          echo "Staged API DLLs:"
          ls -1 dependencies/reframework/api/

      - name: Build
        env:
          VERSION: ${{ steps.version.outputs.value }}
        run: >
          dotnet build Umbra/Umbra.csproj
          --configuration Release
          --verbosity minimal
          -p:Version=${VERSION}
          -p:AssemblyVersion=${VERSION%%-*}.0
          -p:FileVersion=${VERSION%%-*}.0
          -p:InformationalVersion=${VERSION}

      - name: Pack NuGet package
        env:
          VERSION: ${{ steps.version.outputs.value }}
        run: >
          dotnet pack Umbra/Umbra.csproj
          --configuration Release
          --no-build
          --output artifacts/nuget
          -p:Version=${VERSION}
          -p:AssemblyVersion=${VERSION%%-*}.0
          -p:FileVersion=${VERSION%%-*}.0
          -p:InformationalVersion=${VERSION}

      - name: Stage ZIP contents
        run: |
          mkdir -p staging/reframework/plugins/managed/dependencies
          cp Umbra/bin/Release/net10.0/Umbra.dll \
             staging/reframework/plugins/managed/dependencies/

      - name: Create Umbra.zip
        run: cd staging && zip -r ../Umbra.zip reframework/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Umbra
          path: |
            staging/
            artifacts/nuget/
          retention-days: 30
          if-no-files-found: error

      - name: Publish NuGet package
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
          VERSION: ${{ steps.version.outputs.value }}
          GITHUB_OWNER: ${{ github.repository_owner }}
        run: |
          shopt -s nullglob

          nupkg=(artifacts/nuget/Umbra.${VERSION}.nupkg)
          snupkg=(artifacts/nuget/Umbra.${VERSION}.snupkg)

          if (( ${#nupkg[@]} == 0 )); then
            echo "No .nupkg file was produced."
            exit 1
          fi

          echo "Publishing to GitHub Packages..."
          dotnet nuget push "${nupkg[0]}" \
            --source "https://nuget.pkg.github.com/${GITHUB_OWNER}/index.json" \
            --api-key "${GITHUB_TOKEN}" \
            --skip-duplicate

          if [[ -n "${NUGET_API_KEY:-}" ]]; then
            echo "Publishing to nuget.org..."
            dotnet nuget push "${nupkg[0]}" \
              --source "https://api.nuget.org/v3/index.json" \
              --api-key "${NUGET_API_KEY}" \
              --skip-duplicate

            if (( ${#snupkg[@]} > 0 )); then
              dotnet nuget push "${snupkg[0]}" \
                --source "https://api.nuget.org/v3/index.json" \
                --api-key "${NUGET_API_KEY}" \
                --skip-duplicate
            fi
          else
            echo "NUGET_API_KEY is not set; skipping nuget.org publish."
          fi

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Umbra.zip
            artifacts/nuget/*.nupkg
            artifacts/nuget/*.snupkg
          generate_release_notes: true
          body: |
            ## Umbra `v${{ steps.version.outputs.value }}`

            > A support library for [REFramework](https://github.com/praydog/REFramework) mod and plugin development targeting RE Engine titles.

            ---

            ### 🛠️ For Plugin Developers

            Install `Umbra` using one of the following options:

            - NuGet package page: `https://www.nuget.org/packages/Umbra`
            - CLI install: `dotnet add package Umbra`
            - Release assets: download the `.nupkg` / `.snupkg` files and install the package from those files
            - Direct reference: download **`Umbra.zip`** from the release assets and reference `Umbra.dll` in your project

            ---

            ### 🎮 For Players / Game Installation

            Download **`Umbra.zip`** from the release assets and extract it into the game root folder.

            The ZIP preserves the `reframework/plugins/managed/dependencies/` layout used by REFramework plugin deployments.

            ---
