name: Build

on:
  push:
    branches:
      - dev
    tags:
      - 'v*.*.*'
  pull_request:
    branches:
      - dev
    types:
      - opened
      - synchronize
      - reopened

jobs:
  build:
    name: Build Umbra
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Resolve version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "value=0.0.0-dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve REFramework csharp-api.zip asset
        id: refw_api
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASE_TAG=$(gh api repos/praydog/REFramework-nightly/releases \
            --jq '.[0].tag_name')

          ASSET_ID=$(gh api repos/praydog/REFramework-nightly/releases \
            --jq '.[0].assets[] | select(.name == "csharp-api.zip") | .id' \
            | head -n 1)

          ASSET_URL=$(gh api repos/praydog/REFramework-nightly/releases \
            --jq '.[0].assets[] | select(.name == "csharp-api.zip") | .url' \
            | head -n 1)

          if [[ -z "$ASSET_ID" || -z "$ASSET_URL" ]]; then
            echo "Could not resolve csharp-api.zip from praydog/REFramework-nightly."
            exit 1
          fi

          echo "Latest nightly release: $RELEASE_TAG"
          echo "Resolved asset id: $ASSET_ID"
          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "asset_id=$ASSET_ID" >> "$GITHUB_OUTPUT"
          echo "asset_url=$ASSET_URL" >> "$GITHUB_OUTPUT"

      - name: Restore cached REFramework csharp-api.zip
        id: refw_api_cache
        uses: actions/cache/restore@v4
        with:
          path: /tmp/refw-api
          key: refw-csharp-api-${{ steps.refw_api.outputs.asset_id }}

      - name: Download REFramework csharp-api.zip
        if: steps.refw_api_cache.outputs.cache-hit != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p /tmp/refw-api

          gh api \
            -H "Accept: application/octet-stream" \
            "${{ steps.refw_api.outputs.asset_url }}" > /tmp/refw-api/csharp-api.zip

      - name: Save REFramework csharp-api.zip cache
        if: steps.refw_api_cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: /tmp/refw-api
          key: refw-csharp-api-${{ steps.refw_api.outputs.asset_id }}

      - name: Extract and stage API dependencies
        run: |
          EXTRACT=/tmp/refw-extracted
          mkdir -p "$EXTRACT"
          unzip -q /tmp/refw-api/csharp-api.zip -d "$EXTRACT"

          mkdir -p dependencies/reframework/api

          cp "$EXTRACT/reframework/plugins/REFramework.NET.dll" \
             dependencies/reframework/api/

          # Copy only the two managed dependencies directly referenced by the SDK and
          # plugin projects. AssemblyGenerator, REFCoreDeps, and Microsoft.CodeAnalysis.*
          # are REFramework host internals; they are not referenced by any project code.
          cp "$EXTRACT/reframework/plugins/managed/dependencies/Hexa.NET.ImGui.dll" \
             dependencies/reframework/api/
          cp "$EXTRACT/reframework/plugins/managed/dependencies/HexaGen.Runtime.dll" \
             dependencies/reframework/api/

          echo "Staged API DLLs:"
          ls -1 dependencies/reframework/api/

      - name: Build
        env:
          VERSION: ${{ steps.version.outputs.value }}
        run: >
          dotnet build Umbra/Umbra.csproj
          --configuration Release
          --verbosity minimal
          -p:Version=${VERSION}
          -p:AssemblyVersion=${VERSION%%-*}.0
          -p:FileVersion=${VERSION%%-*}.0
          -p:InformationalVersion=${VERSION}

      - name: Run tests
        run: >
          dotnet test Umbra.Tests/Umbra.Tests.csproj
          --configuration Release
          --verbosity minimal

      - name: Pack NuGet package
        env:
          VERSION: ${{ steps.version.outputs.value }}
        run: >
          dotnet pack Umbra/Umbra.csproj
          --configuration Release
          --no-build
          --output artifacts/nuget
          -p:Version=${VERSION}
          -p:AssemblyVersion=${VERSION%%-*}.0
          -p:FileVersion=${VERSION%%-*}.0
          -p:InformationalVersion=${VERSION}

      - name: Stage ZIP contents
        run: |
          mkdir -p staging/reframework/plugins/managed/dependencies
          cp Umbra/bin/Release/net10.0/REFW.Umbra.dll \
             staging/reframework/plugins/managed/dependencies/

      - name: Create REFW.Umbra.zip
        run: cd staging && zip -r ../REFW.Umbra.zip reframework/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: REFW.Umbra
          path: |
            staging/
            artifacts/nuget/
          retention-days: 30
          if-no-files-found: error

      - name: Publish NuGet package
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
          VERSION: ${{ steps.version.outputs.value }}
          GITHUB_OWNER: ${{ github.repository_owner }}
        run: |
          shopt -s nullglob

          nupkg=(artifacts/nuget/REFW.Umbra.${VERSION}.nupkg)

          if (( ${#nupkg[@]} == 0 )); then
            echo "No .nupkg file was produced."
            exit 1
          fi

          echo "Publishing to GitHub Packages..."
          dotnet nuget push "${nupkg[0]}" \
            --source "https://nuget.pkg.github.com/${GITHUB_OWNER}/index.json" \
            --api-key "${GITHUB_TOKEN}" \
            --skip-duplicate

          if [[ -n "${NUGET_API_KEY:-}" ]]; then
            echo "Publishing to nuget.org..."
            dotnet nuget push "${nupkg[0]}" \
              --source "https://api.nuget.org/v3/index.json" \
              --api-key "${NUGET_API_KEY}" \
              --skip-duplicate
          else
            echo "NUGET_API_KEY is not set; skipping nuget.org publish."
          fi

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            REFW.Umbra.zip
            artifacts/nuget/*.nupkg
            artifacts/nuget/*.snupkg
          generate_release_notes: true
          body: |
            ## REFW.Umbra `v${{ steps.version.outputs.value }}`

            > A support library for [REFramework](https://github.com/praydog/REFramework) mod and plugin development targeting RE Engine titles.

            ---

            ### 🛠️ For Plugin Developers

            Install `REFW.Umbra` using one of the following options:

            - NuGet package page: `https://www.nuget.org/packages/REFW.Umbra`
            - CLI install: `dotnet add package REFW.Umbra`
            - Release assets: download the `.nupkg` / `.snupkg` files and install the package from those files
            - Direct reference: download **`REFW.Umbra.zip`** from the release assets and reference `REFW.Umbra.dll` in your project

            ---

            ### 🎮 For Players / Game Installation

            Download **`REFW.Umbra.zip`** from the release assets and extract it into the game root folder so dependent plugins can automatically use the latest installed `REFW.Umbra` version.

            The ZIP preserves the `reframework/plugins/managed/dependencies/` layout used by REFramework plugin deployments.

            ---
